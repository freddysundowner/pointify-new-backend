openapi: 3.0.3
info:
  title: Api
  version: 2.0.0
  description: |-
    Backend API for the Pointify POS system. Use the **Authorize** button with `Bearer <token>` to authenticate.

    **Token types:** Admin · Attendant · Customer · Affiliate
servers:
  - url: /api
    description: Current server
tags:
  - name: Auth
  - name: Shops
  - name: Shop Categories
  - name: Settings
  - name: Measures
  - name: Product Categories
  - name: Products
  - name: Inventory
  - name: Adjustments
  - name: Bad Stocks
  - name: Stock Counts
  - name: Stock Requests
  - name: Transfers
  - name: Customers
  - name: Orders
  - name: Sales
  - name: Sale Returns
  - name: Purchases
  - name: Purchase Returns
  - name: Suppliers
  - name: Expenses
  - name: Cashflow
  - name: Banks
  - name: Payment Methods
  - name: Affiliates
  - name: Subscriptions
  - name: Packages
  - name: Admin
  - name: Attendants
  - name: Permissions
  - name: Reports
  - name: Communications
  - name: Email Templates
  - name: Sync
  - name: Activities
paths:
  /healthz:
    get:
      tags:
        - Auth
      summary: Health check
      responses:
        '200':
          description: OK
  /auth/admin/register:
    post:
      tags:
        - Auth
      summary: Register admin account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                phone:
                  type: string
                referralCode:
                  type: string
              required:
                - name
                - email
                - password
      responses:
        '201':
          description: Admin registered, OTP sent
  /auth/admin/verify-email:
    post:
      tags:
        - Auth
      summary: Verify email with OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                otp:
                  type: string
              required:
                - email
                - otp
      responses:
        '200':
          description: Email verified
  /auth/admin/resend-otp:
    post:
      tags:
        - Auth
      summary: Resend OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
              required:
                - email
      responses:
        '200':
          description: OTP resent
  /auth/admin/login:
    post:
      tags:
        - Auth
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
                - email
                - password
      responses:
        '200':
          description: JWT token + admin object
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
  /auth/admin/forgot-password:
    post:
      tags:
        - Auth
      summary: Request password reset OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
              required:
                - email
      responses:
        '200':
          description: OTP sent
  /auth/admin/reset-password:
    post:
      tags:
        - Auth
      summary: Reset password with OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                otp:
                  type: string
                password:
                  type: string
              required:
                - email
                - otp
                - password
      responses:
        '200':
          description: Password updated
  /auth/admin/reset-password-sms:
    post:
      tags:
        - Auth
      summary: Reset password via SMS OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                otp:
                  type: string
                password:
                  type: string
              required:
                - phone
                - otp
                - password
      responses:
        '200':
          description: Password updated
  /auth/admin/save-local:
    post:
      tags:
        - Auth
      summary: Save admin credentials locally (offline mode)
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Credentials hash saved
  /auth/admin/logout:
    post:
      tags:
        - Auth
      summary: Admin logout
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out
  /auth/attendant/login:
    post:
      tags:
        - Auth
      summary: Attendant login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pin:
                  type: string
                shopId:
                  type: integer
              required:
                - pin
                - shopId
      responses:
        '200':
          description: JWT token + attendant object
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
  /auth/attendant/logout:
    post:
      tags:
        - Auth
      summary: Attendant logout
      x-roles:
        - Attendant
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out
  /auth/me:
    get:
      tags:
        - Auth
      summary: Get current authenticated user
      x-roles:
        - Admin
        - Attendant
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
  /auth/me/last-seen:
    put:
      tags:
        - Auth
      summary: Update last seen timestamp
      x-roles:
        - Admin
        - Attendant
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Updated
  /auth/customer/register:
    post:
      tags:
        - Auth
      summary: Customer self-registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                password:
                  type: string
                shopId:
                  type: integer
              required:
                - name
                - shopId
      responses:
        '201':
          description: Customer registered
  /auth/customer/me:
    get:
      tags:
        - Auth
      summary: Get current customer profile
      x-roles:
        - Customer
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Customer profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
  /auth/customer/login:
    post:
      tags:
        - Auth
      summary: Customer login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                emailOrPhone:
                  type: string
                password:
                  type: string
                shopId:
                  type: integer
              required:
                - emailOrPhone
                - password
                - shopId
      responses:
        '200':
          description: JWT token + customer object
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
  /auth/customer/forgot-password:
    post:
      tags:
        - Auth
      summary: Customer forgot password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                emailOrPhone:
                  type: string
                shopId:
                  type: integer
              required:
                - emailOrPhone
                - shopId
      responses:
        '200':
          description: OTP sent
  /auth/customer/reset-password:
    post:
      tags:
        - Auth
      summary: Customer reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                emailOrPhone:
                  type: string
                otp:
                  type: string
                password:
                  type: string
                shopId:
                  type: integer
              required:
                - emailOrPhone
                - otp
                - password
                - shopId
      responses:
        '200':
          description: Password updated
  /shops:
    get:
      tags:
        - Shops
      summary: List shops for authenticated admin
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Shops list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items: {}
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalPages:
                        type: integer
    post:
      tags:
        - Shops
      summary: Create a new shop
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                categoryId:
                  type: integer
                address:
                  type: string
                currency:
                  type: string
                phone:
                  type: string
              required:
                - name
      responses:
        '200':
          description: Created shop
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
  /shops/{shopId}:
    get:
      tags:
        - Shops
      summary: Get shop by ID
      x-roles:
        - Admin
        - Attendant
      security:
        - BearerAuth: []
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Shop details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
    put:
      tags:
        - Shops
      summary: Update shop
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                address:
                  type: string
      responses:
        '200':
          description: Updated shop
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
    delete:
      tags:
        - Shops
      summary: Delete shop
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted
  /shops/{shopId}/data:
    delete:
      tags:
        - Shops
      summary: Wipe all data for this shop (keep structure)
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Data cleared
  /shops/by-referral/{referralId}:
    get:
      tags:
        - Shops
      summary: Find shop by referral code
      parameters:
        - name: referralId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Shop matching referral code
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
  /shops/{shopId}/redeem-usage:
    post:
      tags:
        - Shops
      summary: Redeem free-trial usage unit
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usage redeemed
  /shops/{shopId}/backup-interval:
    put:
      tags:
        - Shops
      summary: Update sync backup interval
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                interval:
                  type: integer
              required:
                - interval
      responses:
        '200':
          description: Updated
  /shop-categories:
    get:
      tags:
        - Shop Categories
      summary: List shop categories
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Shop categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items: {}
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalPages:
                        type: integer
    post:
      tags:
        - Shop Categories
      summary: Create shop category
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                icon:
                  type: string
              required:
                - name
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
  /shop-categories/{id}:
    get:
      tags:
        - Shop Categories
      summary: Get shop category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Shop category
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
    put:
      tags:
        - Shop Categories
      summary: Update shop category
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
    delete:
      tags:
        - Shop Categories
      summary: Delete shop category
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted
  /settings/{shopId}:
    get:
      tags:
        - Settings
      summary: Get shop settings
      x-roles:
        - Admin
        - Attendant
      security:
        - BearerAuth: []
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Settings object
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
    put:
      tags:
        - Settings
      summary: Update shop settings
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currency:
                  type: string
                taxRate:
                  type: number
                receiptFooter:
                  type: string
                lowStockAlert:
                  type: integer
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
  /measures:
    get:
      tags:
        - Measures
      summary: List measure units
      x-roles:
        - Admin
        - Attendant
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Measure units
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items: {}
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalPages:
                        type: integer
    post:
      tags:
        - Measures
      summary: Create measure unit
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required:
                - name
      responses:
        '200':
          description: Created measure unit
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
  /measures/{id}:
    get:
      tags:
        - Measures
      summary: Get measure unit
      x-roles:
        - Admin
        - Attendant
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Measure unit
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
    put:
      tags:
        - Measures
      summary: Update measure unit
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
    delete:
      tags:
        - Measures
      summary: Delete measure unit
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted
  /product-categories:
    get:
      tags:
        - Product Categories
      summary: List product categories
      x-roles:
        - Admin
        - Attendant
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: shopId
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Product categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items: {}
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalPages:
                        type: integer
    post:
      tags:
        - Product Categories
      summary: Create product category
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                shopId:
                  type: integer
                color:
                  type: string
              required:
                - name
                - shopId
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
  /product-categories/{id}:
    get:
      tags:
        - Product Categories
      summary: Get product category
      x-roles:
        - Admin
        - Attendant
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product category
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
    put:
      tags:
        - Product Categories
      summary: Update product category
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                color:
                  type: string
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data: {}
    delete:
      tags:
        - Product Categories
      summary: Delete product category
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted
  /products:
    get:
      tags:
        - Products
      summary: List products
      x-roles:
        - Admin
        - Attendant
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: shopId
          in: query
          schema:
            type: integer
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: lowStock
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Products
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items: {}
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalPages:
                        type: integer
    post:
      tags:
        - Products
      summary: Create product
      x-roles:
        - Admin
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                shopId:
                  type: integer
                categoryId:
                  type: integer
                barcode:
                  type: string
                buyingPrice:
                  type: number
                sellingPrice:
                  type: number
                quantity:
                  type: number
                unit:
